name: BoldTake CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  # Job 1: Linting and Static Analysis
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          
      - name: Install dependencies
        run: npm ci
        
      - name: Run ESLint
        run: npm run lint
        
      - name: Check for console.logs
        run: |
          if grep -r "console\.log(" --include="*.js" --exclude-dir=node_modules --exclude-dir=test --exclude="*.min.js" . | grep -v "^[[:space:]]*//"; then
            echo "❌ console.log found in production code!"
            exit 1
          fi
          
      - name: Security audit
        run: npm audit --audit-level=moderate

  # Job 2: Unit Tests
  test:
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      matrix:
        node-version: [16.x, 18.x, 20.x]
    steps:
      - uses: actions/checkout@v4
      
      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          
      - name: Install dependencies
        run: npm ci
        
      - name: Run unit tests
        run: npm test

  # Job 3: Build and Bundle Analysis
  build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          
      - name: Install dependencies
        run: npm ci
        
      - name: Build extension
        run: npm run build
        
      - name: Check bundle size
        run: |
          MAX_SIZE=5000000  # 5MB limit
          SIZE=$(du -b dist/ | cut -f1)
          if [ $SIZE -gt $MAX_SIZE ]; then
            echo "❌ Bundle size ($SIZE) exceeds limit ($MAX_SIZE)"
            exit 1
          fi
          echo "✅ Bundle size: $SIZE bytes"
          
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: extension-build
          path: dist/

  # Job 4: E2E Tests
  e2e:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          
      - name: Install dependencies
        run: npm ci
        
      - name: Install Playwright
        run: npx playwright install --with-deps chromium
        
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: extension-build
          path: dist/
          
      - name: Run E2E tests
        run: npm run test:e2e
        
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-results
          path: test-results/

  # Job 5: Performance Tests
  performance:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: extension-build
          path: dist/
          
      - name: Extension Performance Tests
        run: |
          echo "=== Chrome Extension Performance Tests ==="
          echo "1. Bundle size check..."
          SIZE=$(find dist/ -type f -exec ls -l {} \; | awk '{total += $5} END {print total}')
          echo "Bundle size: $SIZE bytes"
          if [ $SIZE -gt 5000000 ]; then
            echo "❌ Bundle size exceeds Chrome Web Store limit"
            exit 1
          else
            echo "✅ Bundle size within Chrome Web Store limit"
          fi
          
          echo "2. File count check..."
          COUNT=$(find dist/ -type f | wc -l)
          echo "Extension files: $COUNT"
          if [ $COUNT -gt 50 ]; then
            echo "⚠️  High file count - consider optimization"
          else
            echo "✅ Reasonable file count"
          fi
          
          echo "3. Critical files check..."
          if [ -f "dist/manifest.json" ] && [ -f "dist/popup.js" ] && [ -f "dist/contentScript.js" ]; then
            echo "✅ All critical extension files present"
          else
            echo "❌ Missing critical extension files"
            exit 1
          fi
          
          echo "✅ Extension performance tests passed"

  # Job 6: Deploy to Staging
  deploy-staging:
    runs-on: ubuntu-latest
    needs: [lint, test, build, e2e, performance]
    if: github.ref == 'refs/heads/develop'
    steps:
      - uses: actions/checkout@v4
      
      - name: Deploy to staging
        run: |
          echo "🚀 Deploying to staging environment"
          # Add your deployment script here
          
      - name: Notify Slack
        uses: slackapi/slack-github-action@v1.24.0
        with:
          payload: |
            {
              "text": "🚀 BoldTake deployed to staging",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*Deployment Complete*\n• Environment: Staging\n• Version: ${{ github.sha }}\n• Author: ${{ github.actor }}"
                  }
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK }}

  # Job 7: Production Release
  release:
    runs-on: ubuntu-latest
    needs: [lint, test, build, e2e, performance]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
      
      - name: Create Release
        run: |
          echo "📦 Creating production release"
          # Add Chrome Web Store deployment here
          
      - name: Tag release
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          VERSION=$(node -p "require('./manifest.json').version")
          git tag -a "v$VERSION" -m "Release v$VERSION"
          git push origin "v$VERSION"
